<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaDa Tasks | Premium Soft UI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --light-shadow: #ffffff;
            --dark-shadow: #d1d9e6;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --accent-primary: #0984e3;
            --accent-secondary: #00cec9;
            --danger: #d63031;
            --success: #00b894;
            --warning: #fdcb6e;
            --info: #0984e3;
            --card-radius: 24px;
            --btn-radius: 14px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --glow: 0 0 15px rgba(9, 132, 227, 0.3);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --light-shadow: #1e293b;
            --dark-shadow: #020617;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #2dd4bf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            transition: var(--transition);
            overflow-x: hidden;
            position: relative;
        }

        /* --- Animated Background --- */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }

        .blob-1 { top: -10%; left: -10%; background: var(--accent-primary); animation-duration: 25s; }
        .blob-2 { bottom: -10%; right: -10%; background: var(--accent-secondary); animation-duration: 30s; animation-delay: -5s; }
        .blob-3 { top: 40%; right: 10%; background: var(--warning); width: 300px; height: 300px; animation-duration: 20s; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, 50px) scale(1.1); }
            66% { transform: translate(-50px, 100px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* --- Layout Container --- */
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            border-radius: var(--btn-radius);
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 6px 6px 12px var(--dark-shadow), -6px -6px 12px var(--light-shadow);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.05);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- Theme Toggle --- */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            background: var(--bg-color);
            box-shadow: 5px 5px 10px var(--dark-shadow), -5px -5px 10px var(--light-shadow);
            color: var(--text-primary);
            transition: var(--transition);
            z-index: 100;
        }

        .theme-toggle:active {
            box-shadow: inset 5px 5px 10px var(--dark-shadow), inset -5px -5px 10px var(--light-shadow);
        }

        /* --- Sections --- */
        .section {
            padding: 1.5rem;
            border-radius: var(--card-radius);
            box-shadow: 10px 10px 20px var(--dark-shadow), -10px -10px 20px var(--light-shadow);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .section:hover {
            box-shadow: 15px 15px 30px var(--dark-shadow), -15px -15px 30px var(--light-shadow);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            color: var(--text-primary);
        }

        .title-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* --- Task Input --- */
        .add-task-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
        }

        .options-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .select-custom {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: none;
            background: var(--bg-color);
            box-shadow: 4px 4px 8px var(--dark-shadow), -4px -4px 8px var(--light-shadow);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .select-custom:active {
            box-shadow: inset 2px 2px 4px var(--dark-shadow), inset -2px -2px 4px var(--light-shadow);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: var(--btn-radius);
            border: none;
            outline: none;
            background: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
            transition: var(--transition);
        }

        input[type="text"]:focus, input[type="date"]:focus {
            box-shadow: inset 2px 2px 4px var(--dark-shadow), inset -2px -2px 4px var(--light-shadow);
        }

        .btn-add, .btn-voice {
            width: 50px;
            height: 50px;
            border-radius: var(--btn-radius);
            border: none;
            background: var(--bg-color);
            box-shadow: 5px 5px 10px var(--dark-shadow), -5px -5px 10px var(--light-shadow);
            color: var(--accent-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-voice.active {
            color: var(--danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(214, 48, 49, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .btn-add:hover, .btn-voice:hover {
            color: var(--accent-secondary);
            transform: translateY(-2px);
        }

        .btn-add:active, .btn-voice:active {
            box-shadow: inset 5px 5px 10px var(--dark-shadow), inset -5px -5px 10px var(--light-shadow);
            transform: scale(0.98);
        }

        /* --- Task List --- */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-item {
            padding: 1.2rem;
            border-radius: var(--btn-radius);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 5px 5px 15px var(--dark-shadow), -5px -5px 15px var(--light-shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: var(--transition);
        }

        .task-item.completed {
            opacity: 0.7;
        }

        .task-item:hover {
            transform: translateY(-2px);
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--bg-color);
            box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: transparent;
            transition: var(--transition);
        }

        .checkbox-custom.checked {
            box-shadow: inset 3px 3px 6px var(--dark-shadow), inset -3px -3px 6px var(--light-shadow);
            color: var(--accent-primary);
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-meta {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
        }

        .task-tags {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-low { background: rgba(79, 172, 254, 0.1); color: var(--info); }
        .badge-medium { background: rgba(255, 176, 32, 0.1); color: var(--warning); }
        .badge-high { background: rgba(255, 77, 77, 0.1); color: var(--danger); }

        .category-tag {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .due-date-badge {
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .due-today { background: rgba(255, 176, 32, 0.1); color: var(--warning); }
        .due-overdue { background: rgba(214, 48, 49, 0.1); color: var(--danger); }
        .due-upcoming { background: rgba(0, 184, 148, 0.1); color: var(--success); }

        .search-container {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-container i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-container input {
            padding-left: 3rem !important;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1rem;
            border-radius: var(--btn-radius);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 4px 4px 10px var(--dark-shadow);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-primary);
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: var(--transition);
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit { color: var(--accent-primary); }
        .btn-delete { color: var(--danger); }

        .btn-icon:hover {
            box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
        }

        .btn-icon:active {
            box-shadow: inset 3px 3px 6px var(--dark-shadow), inset -3px -3px 6px var(--light-shadow);
        }

        .clear-btn {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            margin-left: auto;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            transition: var(--transition);
        }

        .clear-btn:hover {
            background: rgba(255, 77, 77, 0.1);
        }

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* --- Animations --- */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body data-theme="light">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
        <i data-lucide="moon" id="themeIcon"></i>
    </button>
    <!-- Code by Mithuneesh -->
    <div class="app-container">
        <header>
            <div class="logo">
                <i data-lucide="check-circle-2"></i>
                TaDa Tasks
            </div>
            <div class="header-info">
                <span id="currentDate"></span>
                <span id="statSummary">0 Pending</span>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="completionRate">0%</span>
                <span class="stat-label">Completion</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="taskStreak">0</span>
                <span class="stat-label">Day Streak</span>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <i data-lucide="search" size="18"></i>
            <input type="text" id="searchInput" placeholder="Search tasks or categories...">
        </div>

        <div class="section">
            <h2 class="section-title">
                <div class="title-left">
                    <i data-lucide="plus-circle" style="color: var(--accent-primary)"></i> New Task
                </div>
                <button class="btn-voice" id="voiceBtn" title="Voice Input">
                    <i data-lucide="mic"></i>
                </button>
            </h2>
            <form class="add-task-form" id="todoForm">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-add">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <div class="options-group">
                    <select id="prioritySelect" class="select-custom">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    <input type="text" id="categoryInput" class="select-custom" placeholder="Category" style="width: 120px;">
                    <input type="date" id="dueDateInput" class="select-custom" style="width: 150px;">
                </div>
            </form>
        </div>

        <!-- Active Tasks Section -->
        <div class="section">
            <div class="section-title">
                <i data-lucide="layers" style="color: var(--accent-primary)"></i>
                Active Tasks
            </div>
            <ul class="task-list" id="activeTasks">
                <!-- Tasks will be injected here -->
            </ul>
        </div>

        <!-- Completed Tasks Section -->
        <div class="section">
            <div class="section-title">
                <i data-lucide="check-square" style="color: var(--success)"></i>
                Completed
                <button class="clear-btn" onclick="clearCompleted()" id="clearBtn">Clear All</button>
            </div>
            <ul class="task-list" id="completedTasks">
                <!-- Completed tasks will be injected here -->
            </ul>
        </div>
    </div>

    <script>
        // Init Lucide
        lucide.createIcons();

        // State
        let tasks = JSON.parse(localStorage.getItem('tada_tasks')) || [];
        let isDarkMode = localStorage.getItem('tada_theme') === 'dark';

        // Elements
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const prioritySelect = document.getElementById('prioritySelect');
        const categoryInput = document.getElementById('categoryInput');
        const dueDateInput = document.getElementById('dueDateInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const searchInput = document.getElementById('searchInput');
        const activeContainer = document.getElementById('activeTasks');
        const completedContainer = document.getElementById('completedTasks');
        const currentDateEl = document.getElementById('currentDate');
        const statSummaryEl = document.getElementById('statSummary');
        const progressBar = document.getElementById('progressBar');
        const completionRateEl = document.getElementById('completionRate');
        const taskStreakEl = document.getElementById('taskStreak');

        let searchQuery = '';

        // Functions
        function updateDate() {
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            currentDateEl.textContent = new Date().toLocaleDateString('en-US', options);
        }

        function save() {
            localStorage.setItem('tada_tasks', JSON.stringify(tasks));
            render();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            themeIcon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            localStorage.setItem('tada_theme', isDarkMode ? 'dark' : 'light');
            lucide.createIcons();
        }

        function addTask(text, priority, category, dueDate) {
            if (!text.trim()) return;
            tasks.push({
                id: Date.now(),
                text: text.trim(),
                completed: false,
                priority: priority || 'low',
                category: category.trim() || 'General',
                dueDate: dueDate || null,
                createdAt: new Date().toISOString()
            });
            save();
        }

        function toggleTask(id) {
            const taskIndex = tasks.findIndex(t => t.id === id);
            if (taskIndex !== -1) {
                tasks[taskIndex].completed = !tasks[taskIndex].completed;
                tasks[taskIndex].completedAt = tasks[taskIndex].completed ? new Date().toISOString() : null;
                if (tasks[taskIndex].completed) {
                    triggerConfetti();
                }
                save();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            
            const newText = prompt("Edit your task:", task.text);
            if (newText !== null && newText.trim() !== "") {
                task.text = newText.trim();
                save();
            }
        }

        function clearCompleted() {
            if (confirm("Are you sure you want to clear all completed tasks?")) {
                tasks = tasks.filter(t => !t.completed);
                save();
            }
        }

        function triggerConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#4facfe', '#00f2fe', '#00c853']
            });
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            progressBar.style.width = `${percentage}%`;
            statSummaryEl.textContent = `${total - completed} Pending`;
            completionRateEl.textContent = `${percentage}%`;
            
            // Simple streak calculation (based on consecutive days with at least one completion)
            const completedDates = [...new Set(tasks
                .filter(t => t.completed && t.completedAt)
                .map(t => new Date(t.completedAt).toDateString())
            )];
            taskStreakEl.textContent = completedDates.length; 
        }

        function getDueDateLabel(dateStr) {
            if (!dateStr) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const due = new Date(dateStr);
            due.setHours(0, 0, 0, 0);
            
            const diff = (due - today) / (1000 * 60 * 60 * 24);
            
            if (diff === 0) return { label: 'Today', class: 'due-today' };
            if (diff === 1) return { label: 'Tomorrow', class: 'due-upcoming' };
            if (diff < 0) return { label: 'Overdue', class: 'due-overdue' };
            return { label: due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), class: 'due-upcoming' };
        }

        function render() {
            activeContainer.innerHTML = '';
            completedContainer.innerHTML = '';

            let filteredTasks = tasks.filter(t => 
                t.text.toLowerCase().includes(searchQuery.toLowerCase()) || 
                t.category.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const active = filteredTasks.filter(t => !t.completed);
            const completed = filteredTasks.filter(t => t.completed);

            if (active.length === 0) {
                activeContainer.innerHTML = `<div class="empty-state">${searchQuery ? 'No matches found.' : 'No active tasks. Time to relax?'}</div>`;
            } else {
                const priorityOrder = { high: 0, medium: 1, low: 2 };
                active.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
                active.forEach(task => activeContainer.appendChild(createTaskElement(task)));
            }

            if (completed.length === 0) {
                completedContainer.innerHTML = `<div class="empty-state">${searchQuery ? 'No matches found.' : 'Nothing completed yet.'}</div>`;
                document.getElementById('clearBtn').style.display = 'none';
            } else {
                document.getElementById('clearBtn').style.display = 'block';
                completed.forEach(task => completedContainer.appendChild(createTaskElement(task)));
            }

            updateStats();
            lucide.createIcons();
        }

        function createTaskElement(task) {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;

            const dueInfo = getDueDateLabel(task.dueDate);

            li.innerHTML = `
                <div class="checkbox-custom ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                    <i data-lucide="check" size="16"></i>
                </div>
                <div class="task-meta">
                    <span class="task-text">${task.text}</span>
                    <div class="task-tags">
                        <span class="badge badge-${task.priority}">${task.priority}</span>
                        <span class="category-tag"><i data-lucide="tag" size="10"></i> ${task.category}</span>
                        ${dueInfo ? `<span class="due-date-badge ${dueInfo.class}"><i data-lucide="calendar" size="10"></i> ${dueInfo.label}</span>` : ''}
                    </div>
                </div>
                <div class="task-actions">
                    ${!task.completed ? `
                    <button class="btn-icon btn-edit" onclick="editTask(${task.id})" title="Edit Task">
                        <i data-lucide="edit-3" size="18"></i>
                    </button>` : ''}
                    <button class="btn-icon btn-delete" onclick="deleteTask(${task.id})" title="Delete Task">
                        <i data-lucide="trash-2" size="18"></i>
                    </button>
                </div>
            `;

            return li;
        }

        // Event Listeners
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            addTask(todoInput.value, prioritySelect.value, categoryInput.value, dueDateInput.value);
            todoInput.value = '';
            categoryInput.value = '';
            dueDateInput.value = '';
            prioritySelect.value = 'medium';
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        // Voice Recognition
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                voiceBtn.classList.add('active');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                todoInput.value = transcript;
                voiceBtn.classList.remove('active');
            };

            recognition.onerror = () => {
                voiceBtn.classList.remove('active');
            };

            recognition.onend = () => {
                voiceBtn.classList.remove('active');
            };

            voiceBtn.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            voiceBtn.style.display = 'none';
        }

        themeToggle.addEventListener('click', toggleTheme);

        // Initial Boot
        if (isDarkMode) {
            document.body.setAttribute('data-theme', 'dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        }
        updateDate();
        render();
    </script>
</body>

</html>
